<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clima Actual - Tu Pronóstico Personal</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <header>
            <h1><i class="fas fa-cloud-sun"></i> Clima Actual</h1>
            <p>Pronóstico para tu ubicación</p>
        </header>
        
        <div class="location-info">
            <div class="location-icon">
                <i class="fas fa-map-marker-alt"></i>
            </div>
            <div class="location-text">
                <p id="location-name">Obteniendo tu ubicación...</p>
                <p id="location-coords">Coordenadas: --</p>
            </div>
        </div>
        
        <div class="weather-container">
            <div class="current-weather" id="current-weather">
                <div class="loading">
                    <i class="fas fa-spinner fa-spin"></i>
                    <p>Cargando datos del clima...</p>
                </div>
            </div>
            
            <div class="forecast-container" id="forecast-container">
                <h2>Pronóstico Extendido</h2>
                <div class="forecast" id="forecast">
                    <div class="loading">
                        <i class="fas fa-spinner fa-spin"></i>
                        <p>Cargando pronóstico...</p>
                    </div>
                </div>
            </div>
        </div>
        
        <div class="error-message" id="error-message" style="display: none;"></div>
        
        <div class="refresh-btn">
            <button id="refresh-btn">
                <i class="fas fa-sync-alt"></i> Actualizar
            </button>
        </div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
